name: Feature request
description: Propose an improvement to the shipped API or docs
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Prefer proposals that fit the current milestone. Deferred work
        (callbacks, plugins, reflection, raw SQL) is tracked on the
        [roadmap](https://rowguard.readthedocs.io/en/latest/project/roadmap.html)—
        open a design discussion before large implementations.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Sketch the API or docs change you want.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Target surface
      options:
        - Core / planning / validation
        - Streaming
        - Async
        - ORM / SQLModel
        - Docs / examples
        - Deferred milestone (0.6+)
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I read Supported vs planned
          required: true
        - label: I searched existing issues / discussions
          required: true
