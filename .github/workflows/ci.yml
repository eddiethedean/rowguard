name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,async,sqlmodel]"

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src/rowguard tests/typing

      - name: Pytest
        run: pytest --cov=rowguard --cov-report=term-missing

      - name: Example smoke
        run: |
          python examples/basic.py
          python examples/sqlrules_default.py
          python examples/streaming.py
          python examples/async_basic.py
          python examples/orm_projected.py
          python examples/orm_entity.py
          python examples/sqlmodel_basic.py

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and docs deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Sphinx build
        run: make docs

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest benchmarks --benchmark-only
